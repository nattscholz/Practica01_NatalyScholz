# Nombre de la aplicación
spring.application.name=practica01

# Puerto solicitado por la práctica
server.port=91

# Configuración de conexión a MySQL
spring.datasource.url=jdbc:mysql://localhost:3306/practica?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=usuario_practica
spring.datasource.password=la_Clave
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Configuración de JPA / Hibernate
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Logs solicitados
logging.level.root=TRACE
logging.pattern.dateformat=dd HH:mm

# Thymeleaf en desarrollo
spring.thymeleaf.cache=false

# Internacionalización
spring.messages.basename=messages
spring.messages.encoding=UTF-8

# Ocultar banner de Spring
spring.main.banner-mode=off