<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<!-- Fragmento reutilizable del head -->
<head th:replace="~{general/fragmentos :: head}"></head>

<body>

    <!-- Menú principal reutilizable -->
    <header th:replace="~{general/fragmentos :: header}"></header>

    <main class="container mt-5">

        <div class="card shadow-sm">

            <!-- Título del formulario -->
            <div class="card-header bg-success text-white">
                <h1 class="h4 mb-0">Registro de Suculenta</h1>
            </div>

            <div class="card-body">

                <!--
                    Formulario para crear o modificar una suculenta.

                    th:action:
                    Envía los datos al método guardar del controlador.

                    th:object:
                    Enlaza los campos con el objeto suculenta.

                    method="post":
                    Se usa POST porque se envían datos al servidor.

                    enctype="multipart/form-data":
                    Es obligatorio para subir imágenes.
                -->
                <form th:action="@{/suculenta/guardar}"
                      th:object="${suculenta}"
                      method="post"
                      enctype="multipart/form-data">

                    <!-- Campo oculto para saber si se crea o se modifica -->
                    <input type="hidden" th:field="*{idSuculenta}">

                    <!-- Nombre común -->
                    <div class="mb-3">
                        <label for="nombreComun" class="form-label">Nombre común</label>
                        <input type="text"
                               class="form-control"
                               id="nombreComun"
                               th:field="*{nombreComun}"
                               placeholder="Ejemplo: Aloe Vera">

                        <!-- Mensaje de error de validación -->
                        <div class="text-danger"
                             th:if="${#fields.hasErrors('nombreComun')}"
                             th:errors="*{nombreComun}">
                            Error en nombre común
                        </div>
                    </div>

                    <!-- Nombre científico -->
                    <div class="mb-3">
                        <label for="nombreCientifico" class="form-label">Nombre científico</label>
                        <input type="text"
                               class="form-control"
                               id="nombreCientifico"
                               th:field="*{nombreCientifico}"
                               placeholder="Ejemplo: Aloe barbadensis miller">

                        <div class="text-danger"
                             th:if="${#fields.hasErrors('nombreCientifico')}"
                             th:errors="*{nombreCientifico}">
                            Error en nombre científico
                        </div>
                    </div>

                    <!-- Familia -->
                    <div class="mb-3">
                        <label for="familia" class="form-label">Familia</label>
                        <input type="text"
                               class="form-control"
                               id="familia"
                               th:field="*{familia}"
                               placeholder="Ejemplo: Asphodelaceae">

                        <div class="text-danger"
                             th:if="${#fields.hasErrors('familia')}"
                             th:errors="*{familia}">
                            Error en familia
                        </div>
                    </div>

                    <!-- Categoría -->
                    <div class="mb-3">
                        <label for="categoria" class="form-label">Categoría</label>

                        <!--
                            Este select carga las categorías desde el controlador.

                            El controlador debe enviar:
                            model.addAttribute("categorias", categorias);

                            th:field="*{categoria.idCategoria}"
                            Guarda el id de la categoría seleccionada.
                        -->
                        <select class="form-select"
                                id="categoria"
                                th:field="*{categoria.idCategoria}">
                            <option value="">Seleccione una categoría</option>

                            <option th:each="categoria : ${categorias}"
                                    th:value="${categoria.idCategoria}"
                                    th:text="${categoria.nombre}">
                                Categoría
                            </option>
                        </select>
                    </div>

                    <!-- Color principal -->
                    <div class="mb-3">
                        <label for="colorPrincipal" class="form-label">Color principal</label>
                        <input type="text"
                               class="form-control"
                               id="colorPrincipal"
                               th:field="*{colorPrincipal}"
                               placeholder="Ejemplo: Verde">

                        <div class="text-danger"
                             th:if="${#fields.hasErrors('colorPrincipal')}"
                             th:errors="*{colorPrincipal}">
                            Error en color principal
                        </div>
                    </div>

                    <!-- Altura -->
                    <div class="mb-3">
                        <label for="alturaCm" class="form-label">Altura aproximada en cm</label>
                        <input type="number"
                               class="form-control"
                               id="alturaCm"
                               th:field="*{alturaCm}"
                               step="0.01"
                               min="0"
                               placeholder="Ejemplo: 35">

                        <div class="text-danger"
                             th:if="${#fields.hasErrors('alturaCm')}"
                             th:errors="*{alturaCm}">
                            Error en altura
                        </div>
                    </div>

                    <!-- Precio -->
                    <div class="mb-3">
                        <label for="precioEstimado" class="form-label">Precio estimado</label>
                        <input type="number"
                               class="form-control"
                               id="precioEstimado"
                               th:field="*{precioEstimado}"
                               step="0.01"
                               min="0"
                               placeholder="Ejemplo: 4500">

                        <div class="text-danger"
                             th:if="${#fields.hasErrors('precioEstimado')}"
                             th:errors="*{precioEstimado}">
                            Error en precio
                        </div>
                    </div>

                    <!-- Nivel de riego -->
                    <div class="mb-3">
                        <label for="nivelRiego" class="form-label">Nivel de riego</label>
                        <select class="form-select"
                                id="nivelRiego"
                                th:field="*{nivelRiego}">
                            <option value="">Seleccione una opción</option>
                            <option value="Bajo">Bajo</option>
                            <option value="Medio">Medio</option>
                            <option value="Alto">Alto</option>
                        </select>

                        <div class="text-danger"
                             th:if="${#fields.hasErrors('nivelRiego')}"
                             th:errors="*{nivelRiego}">
                            Error en nivel de riego
                        </div>
                    </div>

                    <!-- Imagen -->
                    <div class="mb-3">
                        <label for="imagenFile" class="form-label">Imagen de la suculenta</label>
                        <input type="file"
                               class="form-control"
                               id="imagenFile"
                               name="imagenFile"
                               accept="image/*">
                    </div>

                    <!-- Imagen actual, visible solo al modificar -->
                    <div class="mb-3" th:if="${suculenta.rutaImagen != null and suculenta.rutaImagen != ''}">
                        <label class="form-label">Imagen actual</label>
                        <br>
                        <img th:src="${suculenta.rutaImagen}"
                             alt="Imagen de suculenta"
                             class="img-thumbnail"
                             style="max-width: 220px;">
                    </div>

                    <!-- Botones -->
                    <div class="d-flex justify-content-between">
                        <a th:href="@{/suculentas}" class="btn btn-secondary">
                            <i class="bi bi-arrow-left-circle"></i>
                            Regresar
                        </a>

                        <button type="submit" class="btn btn-success">
                            <i class="bi bi-save"></i>
                            Guardar
                        </button>
                    </div>

                </form>

            </div>
        </div>

    </main>

    <!-- Footer reutilizable -->
    <footer th:replace="~{general/fragmentos :: footer}"></footer>

    <!-- Scripts reutilizables -->
    <div th:replace="~{general/fragmentos :: scripts}"></div>

</body>
</html>
