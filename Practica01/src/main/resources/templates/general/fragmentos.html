<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Fragmentos</title>
</head>
<body>

    <!-- 
        Fragmento: head
        Propósito: cargar Bootstrap y configuración general del HTML.
        Este fragmento se reutiliza en todas las vistas.
    -->
    <head th:fragment="head">
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">

        <title th:text="#{aplicacion.titulo}">Gestión de Suculentas</title>

        <!-- Bootstrap CSS desde CDN -->
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
              rel="stylesheet">

        <!-- Íconos de Bootstrap -->
        <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css"
              rel="stylesheet">
    </head>

    <!-- 
        Fragmento: header
        Propósito: mostrar el menú principal del sistema.
        Menú solicitado: Inicio, Productos, Categorías.
    -->
    <header th:fragment="header" class="bg-success">
        <nav class="navbar navbar-expand-lg navbar-dark bg-success">
            <div class="container">

                <a class="navbar-brand fw-bold" th:href="@{/}">
                    <i class="bi bi-flower1"></i>
                    <span th:text="#{aplicacion.titulo}">Gestión de Suculentas</span>
                </a>

                <button class="navbar-toggler" type="button"
                        data-bs-toggle="collapse"
                        data-bs-target="#navbarPrincipal"
                        aria-controls="navbarPrincipal"
                        aria-expanded="false"
                        aria-label="Mostrar navegación">
                    <span class="navbar-toggler-icon"></span>
                </button>

                <div class="collapse navbar-collapse" id="navbarPrincipal">
                    <ul class="navbar-nav ms-auto">

                        <li class="nav-item">
                            <a class="nav-link" th:href="@{/}" th:text="#{plantilla.inicio}">
                                Inicio
                            </a>
                        </li>

                        <li class="nav-item">
                            <a class="nav-link" th:href="@{/productos}" th:text="#{plantilla.productos}">
                                Productos
                            </a>
                        </li>

                        <li class="nav-item">
                            <a class="nav-link" th:href="@{/categorias}" th:text="#{plantilla.categorias}">
                                Categorías
                            </a>
                        </li>

                        <li class="nav-item dropdown">
                            <a class="nav-link dropdown-toggle" href="#" role="button"
                               data-bs-toggle="dropdown"
                               th:text="#{plantilla.idioma}">
                                Idioma
                            </a>

                            <ul class="dropdown-menu">
                                <li>
                                    <a class="dropdown-item" th:href="@{/(lang=es)}"
                                       th:text="#{plantilla.espanol}">
                                        Español
                                    </a>
                                </li>
                                <li>
                                    <a class="dropdown-item" th:href="@{/(lang=en)}"
                                       th:text="#{plantilla.ingles}">
                                        Inglés
                                    </a>
                                </li>
                            </ul>
                        </li>

                    </ul>
                </div>
            </div>
        </nav>
    </header>

    <!-- 
        Fragmento: footer
        Propósito: mostrar el pie de página reutilizable.
    -->
    <footer th:fragment="footer" class="bg-dark text-white text-center py-3 mt-5">
        <p class="mb-0">
            &copy; <span th:text="#{plantilla.derechos}">Derechos Reservados 2026</span>
        </p>
    </footer>

    <!-- 
        Fragmento: scripts
        Propósito: cargar JavaScript de Bootstrap.
        Es necesario para que funcione el menú responsive y el dropdown de idioma.
    -->
    <div th:fragment="scripts">
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    </div>

</body>
</html>
