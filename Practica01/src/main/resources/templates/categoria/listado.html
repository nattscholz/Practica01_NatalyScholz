<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<!-- Fragmento reutilizable del head -->
<head th:replace="~{general/fragmentos :: head}"></head>

<body>

    <!-- Menú principal reutilizable -->
    <header th:replace="~{general/fragmentos :: header}"></header>

    <main class="container mt-5">

        <!-- Encabezado del listado -->
        <div class="d-flex justify-content-between align-items-center mb-4">
            <div>
                <h1>Listado de Categorías</h1>
                <p class="text-muted">
                    Categorías utilizadas para clasificar las suculentas.
                </p>
            </div>

            <!-- Botón para agregar una categoría -->
            <a th:href="@{/categoria/nuevo}" class="btn btn-success">
                <i class="bi bi-plus-circle"></i>
                Agregar categoría
            </a>
        </div>

        <!-- Total de categorías -->
        <div class="alert alert-info">
            Total de categorías registradas:
            <strong th:text="${totalCategorias}">0</strong>
        </div>

        <!-- Tabla de categorías -->
        <div class="table-responsive" th:if="${categorias != null and !categorias.empty}">

            <table class="table table-bordered table-hover align-middle">

                <thead class="table-success">
                    <tr>
                        <th>ID</th>
                        <th>Nombre</th>
                        <th>Descripción</th>
                        <th>Estado</th>
                        <th class="text-center">Acciones</th>
                    </tr>
                </thead>

                <tbody>

                    <!-- Recorre las categorías enviadas desde CategoriaController -->
                    <tr th:each="categoria : ${categorias}">

                        <!-- ID -->
                        <td th:text="${categoria.idCategoria}">1</td>

                        <!-- Nombre -->
                        <td th:text="${categoria.nombre}">Interior</td>

                        <!-- Descripción -->
                        <td th:text="${categoria.descripcion}">
                            Suculentas para interiores.
                        </td>

                        <!-- Estado -->
                        <td>
                            <span th:if="${categoria.activo}" class="badge bg-success">
                                Activa
                            </span>

                            <span th:if="${!categoria.activo}" class="badge bg-secondary">
                                Inactiva
                            </span>
                        </td>

                        <!-- Acciones -->
                        <td class="text-center">

                            <!-- Modificar categoría -->
                            <a th:href="@{/categoria/modificar/} + ${categoria.idCategoria}"
                               class="btn btn-warning btn-sm mb-1">
                                <i class="bi bi-pencil-square"></i>
                                Modificar
                            </a>

                            <!-- Eliminar categoría -->
                            <a th:href="@{/categoria/eliminar/} + ${categoria.idCategoria}"
                               class="btn btn-danger btn-sm mb-1"
                               onclick="return confirm('¿Está seguro de eliminar esta categoría?')">
                                <i class="bi bi-trash"></i>
                                Eliminar
                            </a>

                        </td>
                    </tr>

                </tbody>
            </table>
        </div>

        <!-- Mensaje cuando no hay categorías -->
        <div class="alert alert-warning" th:if="${categorias == null or categorias.empty}">
            No hay categorías registradas en la base de datos.
        </div>

    </main>

    <!-- Footer reutilizable -->
    <footer th:replace="~{general/fragmentos :: footer}"></footer>

    <!-- Scripts reutilizables -->
    <div th:replace="~{general/fragmentos :: scripts}"></div>

</body>
</html>
