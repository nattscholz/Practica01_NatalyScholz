<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<!-- Se reutiliza el fragmento head -->
<head th:replace="~{general/fragmentos :: head}"></head>

<body>

    <!-- Se reutiliza el menú principal -->
    <header th:replace="~{general/fragmentos :: header}"></header>

    <!-- Contenido principal de la página de inicio -->
    <main class="container mt-5">

        <section class="p-5 mb-4 bg-light rounded-3 shadow-sm">

            <!-- Título principal -->
            <h1 class="display-5 fw-bold">
                Bienvenido al sistema de gestión de suculentas
            </h1>

            <!-- Descripción del sistema -->
            <p class="fs-5">
                Esta aplicación permite administrar suculentas y sus categorías
                utilizando Spring Boot, Thymeleaf, Bootstrap, MySQL y Firebase Storage.
            </p>

            <!-- Botón hacia el listado de suculentas -->
            <a th:href="@{/suculentas}" class="btn btn-success btn-lg">
                Ver suculentas
            </a>

        </section>

    </main>

    <!-- Pie de página -->
    <footer th:replace="~{general/fragmentos :: footer}"></footer>

    <!-- Scripts -->
    <div th:replace="~{general/fragmentos :: scripts}"></div>

</body>
</html>
